name: Build R619AC-IMM23.05-k9

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH connection to Actions'
        required: false
        default: 'false'
  watch:
    types: [started]

permissions:
  contents: write
  actions: write

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-23.05
  UPLOAD_BIN_DIR: true
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialization environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /etc/apt/sources.list.d/* \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc

          sudo -E apt-get -qq update

          sudo -E apt-get -qq install -y \
            build-essential \
            clang \
            flex \
            bison \
            g++ \
            gawk \
            gcc-multilib \
            g++-multilib \
            gettext \
            git \
            libncurses5-dev \
            libssl-dev \
            python3 \
            python3-distutils \
            python3-pip \
            python3-ply \
            python3-setuptools \
            rsync \
            unzip \
            zlib1g-dev \
            file \
            wget \
            curl \
            swig \
            time \
            xsltproc \
            libelf-dev \
            libglib2.0-dev \
            libgmp3-dev \
            libltdl-dev \
            libmpc-dev \
            libmpfr-dev \
            libreadline-dev \
            libz-dev \
            zstd \
            qemu-utils \
            upx-ucl \
            ccache \
            device-tree-compiler \
            scons \
            gperf \
            intltool \
            mkisofs \
            ecj \
            fastjar

          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean

          sudo timedatectl set-timezone "$TZ"

          sudo mkdir -p /workdir
          sudo chown $USER:$GROUPS /workdir

      - name: Clone source code
        working-directory: /workdir
        run: |
          df -hT $PWD

          git clone --depth=1 $REPO_URL -b $REPO_BRANCH openwrt

          ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

          cd openwrt

          ./scripts/feeds update -a
          ./scripts/feeds install -a

          useVersionInfo=$(git show -s --date=short --format="Author: %an<br/>date: %cd<br/>commit: %s<br/>commit hash: %H<br/>")
          echo "useVersionInfo=$useVersionInfo" >> $GITHUB_ENV

      - name: Cache
        uses: klever1988/cachewrtbuild@main
        with:
          ccache: 'true'
          prefix: ${{ github.workspace }}/openwrt

      - name: Update packages
        env:
          SCKEY: ${{ secrets.ACTIONS_TRIGGER_PAT }}
        run: |
          cd openwrt

          find ./ | grep Makefile | grep v2ray-geodata | xargs rm -f
          find ./ | grep Makefile | grep mosdns | xargs rm -f

          git clone https://github.com/sbwml/luci-app-mosdns -b v5 package/mosdns
          git clone https://github.com/sbwml/v2ray-geodata package/v2ray-geodata

      - name: File Patch Before
        run: |
          cp -f patch/rc.local openwrt/package/base-files/files/etc/rc.local

          cd openwrt

          curl -sfL https://github.com/leesuncom/package/raw/main/99-default-settings \
            -o package/emortal/default-settings/files/99-default-settings-chinese

          sed -i 's/192.168.1.1/192.168.1.2/g' package/base-files/files/bin/config_generate
          sed -i 's/[b|B]ootstrap/argon/g' ./feeds/luci/collections/luci/Makefile

      - name: Update feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: File Patch After
        run: |
          cd openwrt
          rm -rf feeds/packages/lang/golang
          git clone https://github.com/sbwml/packages_lang_golang -b 23.x feeds/packages/lang/golang

      - name: Generate configuration file
        run: |
          cd openwrt

          rm -f ./.config*
          touch ./.config

          cat >> .config <<EOF
          CONFIG_TARGET_ipq40xx=y
          CONFIG_TARGET_ipq40xx_generic=y
          CONFIG_TARGET_ipq40xx_generic_DEVICE_p2w_r619ac-128m=y

          CONFIG_PACKAGE_dnsmasq_full_dhcpv6=y
          CONFIG_PACKAGE_ip6tables=y
          CONFIG_PACKAGE_ip6tables-extra=y
          CONFIG_PACKAGE_ip6tables-mod-nat=y
          CONFIG_PACKAGE_ipv6helper=y

          CONFIG_PACKAGE_luci-app-argon-config=y
          CONFIG_PACKAGE_luci-app-firewall=y
          CONFIG_PACKAGE_luci-app-mosdns=y
          CONFIG_PACKAGE_luci-app-openclash=y
          CONFIG_PACKAGE_luci-app-smartdns=y
          CONFIG_PACKAGE_luci-app-ttyd=y
          CONFIG_PACKAGE_luci-app-upnp=y
          CONFIG_PACKAGE_luci-app-vlmcsd=y
          CONFIG_PACKAGE_luci-app-wol=y
          CONFIG_PACKAGE_luci-app-iptvhelper=y
          CONFIG_PACKAGE_luci-app-opkg=y

          CONFIG_PACKAGE_luci-theme-argon=y
          EOF

          sed -i 's/^[ \t]*//g' ./.config

          make defconfig

      - name: SSH connection to Actions
        uses: P3TERX/ssh2actions@v1.0.0
        if: (github.event.inputs.ssh == 'true' && github.event.inputs.ssh != 'false') || contains(github.event.action, 'ssh')
        env:
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

      - name: Download package
        id: package
        run: |
          cd openwrt

          make download -j8

          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

      - name: Compile the firmware
        id: compile
        run: |
          cd openwrt

          echo "$(nproc) thread compile"

          make -j$(nproc) || make -j1 || make -j1 V=s

          echo "status=success" >> $GITHUB_OUTPUT

          grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME

          if [ -s DEVICE_NAME ]; then
            echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
          fi

          echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

      - name: Check space usage
        if: always()
        run: df -hT

      - name: Organize files
        id: organize
        if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
        run: |
          if [ -d "$GITHUB_WORKSPACE/openwrt/bin/packages" ]; then
            cd $GITHUB_WORKSPACE/openwrt/bin/packages
            tar -zcvf Packages.tar.gz ./* || true
            cp Packages.tar.gz $GITHUB_WORKSPACE/openwrt/bin/targets/*/*/ || true
          fi

          cd $GITHUB_WORKSPACE/openwrt/bin/targets/*/*

          rm -rf packages

          echo "FIRMWARE=$PWD" >> $GITHUB_ENV
          echo "status=success" >> $GITHUB_OUTPUT
          echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT

      - name: Calculate MD5
        if: steps.organize.outputs.status == 'success' && !cancelled()
        run: |
          cd ${{ env.FIRMWARE }}

          rm -rf sha256sums

          MD5=$(md5sum * | sed ':a;N;$!ba;s/\n/<br>/g')

          echo "MD5=$MD5" >> $GITHUB_ENV

      - name: Upload firmware directory
        uses: actions/upload-artifact@v4
        if: steps.organize.outputs.status == 'success' && !cancelled()
        with:
          name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
          path: ${{ env.FIRMWARE }}

      - name: Upload OpenWrt Firmware to Release
        id: release
        uses: ncipollo/release-action@v1
        if: steps.organize.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true' && !cancelled()
        with:
          name: R${{ steps.organize.outputs.release_tag }} for R619AC
          allowUpdates: true
          removeArtifacts: true
          tag: ${{ steps.organize.outputs.release_tag }}
          commit: master
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: ${{ env.FIRMWARE }}/*
          body: |
            - 默认IP：192.168.1.2
            - 默认密码：password
            - 当前源码：${{ env.REPO_URL }}
            - 当前分支：${{ env.REPO_BRANCH }}
            - 下载后请仔细校验 MD5，如不正确请重新下载。

            ${{ env.useVersionInfo }}

            `md5sum`

            > ${{ env.MD5 }}

      - name: Delete workflow runs
        uses: GitRML/delete-workflow-runs@main
        if: always()
        with:
          retain_days: 1
          keep_minimum_runs: 3

      - name: Remove old Releases
        uses: dev-drprasad/delete-older-releases@v0.3.4
        if: env.UPLOAD_RELEASE == 'true' && !cancelled()
        with:
          keep_latest: 3
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
